<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/style-amazon.css" />
  </head>
  <body>
    <header>
      <img src="./assets/images/logo.png" alt="" />
    </header>
    <main>
      <nav>
        <div>
          <p>All Today's deals Customer Service Registry Gift Cards Sell</p>
        </div>
      </nav>
      <section>
        <h2>Shop All Holiday Gift Cards</h2>
        <figure id="guides">
          <img
            style="width: 100%"
            height="100%"
            src="./assets/images/bg-image.png"
            alt="immagine-gift"
          />
          <h1>Holiday Gift Guides</h1>
          <p id="be-go">Be a go-gifter</p>
        </figure>
        <div id="find">
          <h3>Find the perfect gift <span>Shop now</span></h3>
          <div id="foto">
            <img class="foto" src="./assets/images/img_1.jpg" alt="tablet" />
            <img class="foto" src="./assets/images/img_2.jpg" alt="computer" />
            <img
              class="foto"
              src="./assets/images/img_3.jpg"
              alt="orologi smart"
            />
            <img
              class="foto"
              src="./assets/images/img_4.jpg"
              alt="cane e gatto"
            />
          </div>
        </div>
        <img
          style="margin: 2em 0em 0 0em; width: 100%"
          src="./assets/images/img_9.png"
          alt="immagine del VR"
        />
        <h3 class="special-p">
          Play the gifting game <span>Shop gaming</span>
        </h3>
        <img
          style="margin: 1em 0em 0 0em; width: 100%"
          src="./assets/images/img_10.png"
          alt="strumenti audio"
        />
        <h3 class="special-p">
          The sound of cheer <span>Shop Audio & Accessories</span>
        </h3>
      </section>
    </main>
    <footer>
      <a href="Back to top">Back to top</a>
      <div id="logo">
        <img
          style="margin: 3em; width: 6%"
          src="./assets/images/logo.png"
          alt=""
        />
      </div>
    </footer>
    <script src="./js/js.js"></script>
  </body>
</html>
